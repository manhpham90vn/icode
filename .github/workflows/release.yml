name: Release

on:
  push:
    tags:
      - 'v*' # Trigger on any tag starting with 'v' (e.g., v1.0.0)

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Build Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: icode
            asset_name: icode-linux-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: icode.exe
            asset_name: icode-windows-amd64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: icode
            asset_name: icode-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: icode
            asset_name: icode-macos-arm64

    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-${{ matrix.target }}-

    - name: Build
      run: cargo build --release --locked --target ${{ matrix.target }}

    - name: Rename artifact (Linux/macOS)
      if: runner.os != 'Windows'
      run: mv target/${{ matrix.target }}/release/${{ matrix.artifact_name }} target/${{ matrix.target }}/release/${{ matrix.asset_name }}

    - name: Rename artifact (Windows)
      if: runner.os == 'Windows'
      run: Move-Item target\${{ matrix.target }}\release\${{ matrix.artifact_name }} target\${{ matrix.target }}\release\${{ matrix.asset_name }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset_name }}
        path: target/${{ matrix.target }}/release/${{ matrix.asset_name }}

  release:
    name: Create Release
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - name: Download all workflow run artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Display downloaded files
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
